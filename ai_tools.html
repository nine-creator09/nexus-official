<html lang="ja">

<head>

    <link

    <style>
        :root {
            --bg: #08090d;
            --bg2: #0e1016;
            --bg3: rgba(255, 255, 255, 0.025);
            --bg-hover: rgba(200, 170, 110, 0.04);
            --border: #2d3039;
            --border-hover: rgba(200, 170, 110, 0.2);
            --text: #eaeaea;
            --text2: #a1a3a8;
            --text3: #757880;
            --gold: #d4a853;
            --gold-glow: #dbb170;
            --gold-dim: rgba(212, 168, 83, .12);
            --r: 12px;

            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-bg-hover: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            --glass-glow: rgba(212, 168, 83, 0.15);
            --blue: #5aadff;
            --green: #4ade80;
            --purple: #b39dff;
            --red: #f87171;
            --orange: #fb923c;
            --cyan: #22d3ee;
            --pink: #f472b6;
            --hdr: rgba(8, 9, 13, 0.88);
            --card-shadow: 0 1px 3px rgba(0, 0, 0, .3), 0 0 0 1px rgba(255, 255, 255, .02);
            --card-hover-shadow: 0 8px 32px rgba(0, 0, 0, .5), 0 0 0 1px rgba(212, 168, 83, .1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            overflow-x: hidden;
            scroll-behavior: smooth
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background .5s ease, color .4s ease;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse at 10% -5%, rgba(212, 168, 83, .04) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(90, 173, 255, .015) 0%, transparent 50%)
        }

        [data-theme="light"] body::before {
            opacity: 0
        }

        /* Header */
        .hdr {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--hdr);
            backdrop-filter: blur(30px) saturate(1.2);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .hdr::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 83, .15), transparent);
            pointer-events: none
        }

        .hdr-l {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: .25em;
            color: inherit;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none
        }

        .logo-mark {
            width: 7px;
            height: 7px;
            background: linear-gradient(135deg, #c8956c, #d4a853);
            border-radius: 50%;
            animation: logoPulse 3s ease-in-out infinite
        }

        @keyframes logoPulse {

            0%,
            100% {
                opacity: .7;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.2)
            }
        }

        .logo-sub {
            font-size: .48rem;
            color: var(--text3);
            letter-spacing: .15em;
            text-transform: uppercase
        }

        .hdr-r {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .ibtn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text3);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            transition: all .25s
        }

        .ibtn:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .back-link {
            font-size: .6rem;
            color: var(--text3);
            text-decoration: none;
            letter-spacing: .06em;
            transition: color .25s;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .back-link:hover {
            color: var(--gold)
        }

        /* Hero */
        .hero {
            position: relative;
            overflow: hidden;
            padding: 80px 32px 48px;
            text-align: center;
            background: var(--bg2)
        }

        .hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: .25;
            pointer-events: none;
            filter: blur(1px)
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(8, 9, 13, .3), var(--bg));
            pointer-events: none
        }

        [data-theme="light"] .hero-overlay {
            background: linear-gradient(to bottom, rgba(248, 247, 244, .3), var(--bg))
        }

        .hero-content {
            position: relative;
            z-index: 1
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem;
            font-weight: 300;
            letter-spacing: .3em;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #fcefd4, #dbb170, #c8956c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }

        .hero p {
            font-size: .78rem;
            color: var(--text2);
            letter-spacing: .04em;
            max-width: 500px;
            margin: 0 auto
        }

        /* Hero badges removed by user request */

        /* Category Filter */
        .cat-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 28px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            background: var(--bg2)
        }

        .cat-bar::-webkit-scrollbar {
            display: none
        }

        .cat-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 16px;
            font-size: .62rem;
            font-weight: 600;
            letter-spacing: .04em;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            transition: all .25s;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0
        }

        .cat-btn:hover {
            border-color: var(--text2)
        }

        .cat-btn.active {
            background: var(--gold-dim);
            border-color: rgba(200, 170, 110, .3);
            color: var(--gold)
        }

        .cat-cnt {
            font-size: .5rem;
            font-family: 'JetBrains Mono', monospace;
            opacity: .7;
            background: rgba(255, 255, 255, .06);
            padding: 1px 5px;
            border-radius: 8px
        }

        .cat-btn.active .cat-cnt {
            background: rgba(212, 168, 83, .15)
        }

        /* Main */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 32px 80px
        }

        /* Category Section */
        .cat-section {
            margin-bottom: 36px
        }

        .cat-title {
            font-size: .62rem;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 0 0 10px 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .cat-icon {
            font-size: .85rem
        }

        /* Tool Card Grid */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px
        }

        /* Tool Card */
        .tool-card {
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--r);
            transition: all .5s cubic-bezier(.25, 1, .5, 1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, var(--glass-glow) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
            pointer-events: none;
        }

        .tool-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(212, 168, 83, 0.4);
            background: var(--glass-bg-hover);
            box-shadow: 0 20px 40px var(--glass-shadow), inset 0 0 20px rgba(212, 168, 83, 0.05);
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        .tool-card:hover .tool-name {
            color: var(--gold)
        }

        .tool-top,
        .tool-desc,
        .tool-meta {
            position: relative;
            z-index: 1;
        }

        .tool-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px
        }

        .tool-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
            transition: all .5s ease;
        }

        .tool-icon::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08) 0%, transparent 40%);
            top: -25%;
            left: -25%;
            opacity: 0.5;
            transition: all .5s ease;
        }

        .tool-card:hover .tool-icon {
            border-color: rgba(212, 168, 83, 0.5);
            box-shadow: inset 0 0 15px rgba(212, 168, 83, 0.15);
            transform: scale(1.05);
        }

        .tool-card:hover .tool-icon::after {
            background: radial-gradient(circle at center, rgba(212, 168, 83, 0.25) 0%, transparent 40%);
            opacity: 1;
        }

        .tool-name {
            font-size: .88rem;
            font-weight: 600;
            letter-spacing: .01em;
            transition: color .25s
        }

        .tool-desc {
            font-size: .7rem;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 12px;
            flex: 1
        }

        .tool-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap
        }

        .tool-tag {
            font-size: .5rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: .03em
        }

        .tag-nexus {
            background: linear-gradient(135deg, rgba(212, 168, 83, .15), rgba(212, 168, 83, .08));
            color: var(--gold);
            border: 1px solid rgba(212, 168, 83, .25)
        }

        .tag-free {
            background: rgba(74, 222, 128, .1);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, .15)
        }

        .tag-paid {
            background: rgba(167, 139, 250, .08);
            color: var(--purple);
            border: 1px solid rgba(167, 139, 250, .12)
        }

        .tag-freemium {
            background: rgba(251, 146, 60, .08);
            color: var(--orange);
            border: 1px solid rgba(251, 146, 60, .12)
        }

        .tag-opensource {
            background: rgba(34, 211, 238, .08);
            color: var(--cyan);
            border: 1px solid rgba(34, 211, 238, .12)
        }

        .tool-arrow {
            font-size: .65rem;
            color: var(--text3);
            margin-left: auto;
            transition: all .25s;
            opacity: 0
        }

        .tool-card:hover .tool-arrow {
            opacity: 1;
            transform: translateX(3px)
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 32px;
            border-top: 1px solid var(--border);
            font-size: .52rem;
            color: var(--text3);
            letter-spacing: .08em
        }

        .footer a {
            color: var(--gold);
            text-decoration: none
        }

        .lang-wrap {
            position: relative;
            display: inline-flex;
            align-items: center
        }

        .lang-sel {
            appearance: none;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 4px 24px 4px 8px;
            border-radius: 6px;
            font-size: .6rem;
            cursor: pointer;
            transition: all .25s;
            font-family: Inter, sans-serif
        }

        .lang-sel:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .lang-sel option {
            background: #1a1a1e;
            color: #e0e0e0
        }

        [data-theme="light"] .lang-sel option {
            background: #fff;
            color: #222
        }

        .lang-arr {
            position: absolute;
            right: 8px;
            font-size: .45rem;
            color: var(--text3);
            pointer-events: none
        }

        /* Responsive */
        @media (max-width: 640px) {
            .hero h1 {
                font-size: 1.8rem;
                letter-spacing: .12em
            }

            .hero {
                padding: 60px 20px 36px
            }

            .main {
                padding: 20px 16px 60px
            }

            .cat-bar {
                padding: 8px 16px
            }

            .tool-grid {
                grid-template-columns: 1fr
            }

            .hdr {
                padding: 0 16px
            }
        }
    </style>
</head>
