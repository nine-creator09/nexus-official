        function t(key) { return (UI[currentLang] || UI.ja)[key] || UI.ja[key]; }

        function getDesc(tool) {
            if (currentLang === "ja") return tool.desc;
            if (window.TOOL_I18N && window.TOOL_I18N[currentLang] && window.TOOL_I18N[currentLang][tool.name]) {
                return window.TOOL_I18N[currentLang][tool.name];
            }
            return tool.desc;
        }

        function renderTools() {
            const container = document.getElementById("toolsContainer");
            const cats = currentCat === "all" ? Object.keys(CAT_META) : [currentCat];
            const ui = UI[currentLang] || UI.ja;
            let html = "";
            cats.forEach(cat => {
                const tools = TOOLS.filter(t => t.cat === cat);
                if (!tools.length) return;
                html += `<section class="cat-section" id="section-${cat}">
                    <h2 class="cat-title">${ui.cats[cat]}</h2>
                    <div class="tool-grid">
                        ${tools.map(t => {
                    const tagHtml = t.tags.map(tag => {
                        if (tag === "nexus") return `<span class="tool-tag tag-nexus">${ui.nexusTag}</span>`;
                        const info = TAG_LABELS[tag];
                        return info ? `<span class="tool-tag ${info.cls}">${info.text}</span>` : '';
                    }).join('');
                    return `<a href="${t.url}" target="_blank" rel="noopener noreferrer" class="tool-card">
                                <div class="tool-top">
                                    <div class="tool-icon">${t.icon}</div>
                                    <div class="tool-name">${t.name}</div>
                                </div>
                                <div class="tool-desc">${getDesc(t)}</div>
                                <div class="tool-meta">${tagHtml}</div>
                            </a>`;
                }).join('')}
                    </div>
                </section>`;
            });
            container.innerHTML = html;
        }

        function updateUI() {
            const ui = UI[currentLang] || UI.ja;
            const backL = document.getElementById("backLink");
            if (backL) backL.textContent = ui.back;
            const backLBot = document.getElementById("backLinkBottom");
            if (backLBot) backLBot.textContent = ui.back;

            const desc = document.getElementById("heroDescText");
            if (desc) desc.innerHTML = ui.heroDesc;

            const badges = document.querySelectorAll(".hero-badge");
            ui.badges.forEach((b, i) => { if (badges[i]) badges[i].textContent = b; });

            const btns = document.querySelectorAll(".cat-btn");
            const keys = ["all", "image", "video", "3d", "music", "voice", "ai", "other"];
            btns.forEach((btn, i) => {
                const cnt = btn.querySelector(".cat-cnt");
                const cntHtml = cnt ? ` ${cnt.outerHTML}` : "";
                btn.innerHTML = ui.filterBtns[keys[i]] + cntHtml;
            });
        }

        function updateCounts() {
            // Count logic removed since UI is gone
        }

        function setLang(l) {
            currentLang = l;
            document.getElementById("langSelect").value = l;
            updateUI();
            renderTools();
        }

        // Category filter
        const catBar = document.getElementById("catBar");
        if (catBar) {
            catBar.addEventListener("click", e => {
                const btn = e.target.closest(".cat-btn");
                if (!btn) return;
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCat = btn.dataset.cat;
                renderTools();
            });
        }

        // Feature removed by request

        // Init
        updateCounts();
        renderTools();
    </script>
