name: Update AI News Data

on:
  schedule:
    # 6時間ごとに実行（UTC: 0, 6, 12, 18 → JST: 9, 15, 21, 3）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch AI News
        run: python ai_news.py

      - name: Commit & Push
        run: |
          git config user.name "NEXUS Bot"
          git config user.email "nexus-bot@users.noreply.github.com"
          git add ai_news_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update AI news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
